<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator MVC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div id="expression" class="expression">0</div>
      <div id="result" class="result">0</div>
    </div>

    <div class="buttons">
      <button data-action="clear" class="btn operator">AC</button>
      <button data-action="operator" data-value="/" class="btn operator">/</button>
      <button data-action="operator" data-value="*" class="btn operator">*</button>
      <button data-action="operator" data-value="-" class="btn operator">-</button>

      <button data-action="number" data-value="7" class="btn">7</button>
      <button data-action="number" data-value="8" class="btn">8</button>
      <button data-action="number" data-value="9" class="btn">9</button>
      <button data-action="operator" data-value="+" class="btn operator">+</button>

      <button data-action="number" data-value="4" class="btn">4</button>
      <button data-action="number" data-value="5" class="btn">5</button>
      <button data-action="number" data-value="6" class="btn">6</button>
      <button data-action="equals" class="btn equal" rowspan="2">=</button>

      <button data-action="number" data-value="1" class="btn">1</button>
      <button data-action="number" data-value="2" class="btn">2</button>
      <button data-action="number" data-value="3" class="btn">3</button>

      <button data-action="number" data-value="0" class="btn zero">0</button>
    </div>
  </div>

  <script src="model.js"></script>
  <script src="view.js"></script>
  <script src="controller.js"></script>
</body>
</html>
